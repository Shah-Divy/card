  <title>Shapath Group</title>

  <style>
    body {
      font-family: "Bricolage Grotesque", sans-serif;

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding-left: 20px;
      padding-right: 20px;
    }
  </style>

  <script>
    function downloadVCard(name) {
      let vCardData = "";
      let filename = "";

      if (name === "jainam") {
        vCardData = `BEGIN:VCARD
VERSION:3.0
FN:Jainam Shah
N:Shah;Jainam;;;
ORG:Shapath Group;
TITLE:Founder
EMAIL;TYPE=INTERNET;TYPE=WORK:jainam@shapathgroup.com
TEL;TYPE=CELL:+919825957138
NOTE:Redefining Real Estate with Excellence
REV:20241216T120000Z
END:VCARD`;
        filename = "Jainam_Shah_Shapath_Group.vcf";
      } else {
        vCardData = `BEGIN:VCARD
VERSION:3.0
FN:Jasmin Shah
N:Shah;Jasmin;;;
ORG:Shapath Group;
TITLE:Founder
EMAIL;TYPE=INTERNET;TYPE=WORK:jasmin@shapathgroup.com
TEL;TYPE=CELL:+917043023331
NOTE:Redefining Real Estate with Excellence
REV:20241216T120000Z
END:VCARD`;
        filename = "Jasmin_Shah_Shapath_Group.vcf";
      }

      const blob = new Blob([vCardData], { type: "text/vcard" });
      const link = document.createElement("a");

      link.href = URL.createObjectURL(blob);
      link.download = filename;

      link.click();

      URL.revokeObjectURL(link.href);
    }
  </script>

<body class="min-h-screen bg-cover bg-center bg-no-repeat" style="background-image: url('images/bg1.jpeg');">

      <!-- Action Buttons -->

        </button>

        <!-- Address -->
        <a href="https://maps.app.goo.gl/3BuRtaKEpmgVa3wt7" target="_blank" class="block">

        <!-- Save Contact -->
